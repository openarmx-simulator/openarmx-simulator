<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenArmX 로봇 시뮬레이터</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a14; color:#dde;
  font-family:'Segoe UI',sans-serif;
  display:flex; height:100vh; overflow:hidden;
}

/* ── 뷰포트 ── */
#viewport {
  flex:1; position:relative;
  background:radial-gradient(ellipse at center,#111830 0%,#0a0a14 70%);
  display:flex; flex-direction:column;
}
#viewport canvas { display:block; flex:1; }

#hud {
  position:absolute; top:12px; left:12px;
  display:flex; flex-direction:column; gap:6px; pointer-events:none;
}
.hud-chip {
  background:rgba(10,10,30,0.88);
  border:1px solid #1e2550;
  padding:5px 12px; border-radius:6px;
  font-size:11px; color:#88aadd; line-height:1.7;
}
#rec-badge {
  display:none; position:absolute; top:12px; right:12px;
  background:rgba(180,20,20,0.9); color:#fff;
  padding:4px 12px; border-radius:5px; font-size:12px;
  animation:blink 1s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* ── 공통 버튼 토큰 ── */
:root {
  --btn-radius: 5px;
  --btn-font: 12px;
  --btn-fw: 600;
  --btn-transition: background .15s, border-color .15s, color .15s;
  --c-primary:  #1d4ed8;
  --c-primary-h:#2563eb;
  --c-success:  #065f46;
  --c-success-h:#047857;
  --c-muted:    #1e293b;
  --c-muted-h:  #273449;
  --c-danger:   #4c1d95;
  --c-danger-h: #6d28d9;
  --c-border:   #2a3060;
  --c-text:     #94a3b8;
  --c-text-hi:  #cbd5e1;
}

/* 재생바 */
#playbar {
  height:44px; background:rgba(8,8,20,0.95);
  border-top:1px solid #1a1a35;
  display:flex; align-items:center; gap:6px; padding:0 14px;
  flex-shrink:0;
}
.pb-btn {
  background:var(--c-muted); border:1px solid var(--c-border);
  color:var(--c-text); padding:5px 12px;
  border-radius:var(--btn-radius); cursor:pointer;
  font-size:var(--btn-font); font-weight:var(--btn-fw);
  transition:var(--btn-transition); white-space:nowrap;
}
.pb-btn:hover { background:var(--c-muted-h); color:var(--c-text-hi); border-color:#3a4a80; }
.pb-btn.on { background:var(--c-primary); border-color:var(--c-primary-h); color:#fff; }
#scrubber { flex:1; accent-color:#4a90e2; cursor:pointer; }
#time-lbl { font-size:12px; color:#556; min-width:90px; text-align:right; font-family:monospace; }
#status-lbl { font-size:11px; color:#445; min-width:120px; }

/* ── 사이드바 ── */
#sidebar {
  width:360px; background:#0d0d1e;
  border-left:1px solid #181830;
  display:flex; flex-direction:column; overflow:hidden;
}
.tabs { display:flex; background:#080816; border-bottom:1px solid #181830; flex-shrink:0; }
.tab-btn {
  flex:1; padding:10px 4px; text-align:center; cursor:pointer;
  font-size:11px; color:#446; letter-spacing:.4px;
  border-bottom:2px solid transparent; transition:all .15s;
}
.tab-btn.active { color:#4af; border-bottom-color:#4a90e2; background:#0d0d1e; }
.tab-btn:hover:not(.active) { color:#88a; }

.tab-pane { display:none; flex:1; flex-direction:column; overflow:hidden; }
.tab-pane.active { display:flex; }

.scroll { flex:1; overflow-y:auto; padding:12px; }
.scroll::-webkit-scrollbar { width:4px; }
.scroll::-webkit-scrollbar-thumb { background:#222240; border-radius:2px; }

.sec { font-size:10px; letter-spacing:2px; color:#4a90e2; text-transform:uppercase;
       padding-bottom:5px; border-bottom:1px solid #181830; margin:10px 0 8px; }
.sec:first-child { margin-top:0; }

/* ── 포즈 카드 ── */
.pose-card {
  display:flex; align-items:center; gap:6px;
  padding:6px 10px; background:#111125;
  border:1px solid #1c1c35; border-radius:5px;
  margin-bottom:4px; cursor:pointer; transition:background .1s;
}
.pose-card:hover { background:#181835; }
.pose-card.active { border-color:#4a90e2; background:#0e1a30; }
.pose-id { font-size:11px; color:#4a90e2; font-family:monospace; min-width:52px; }
.pose-vals { font-size:10px; color:#445; flex:1; overflow:hidden;
             text-overflow:ellipsis; white-space:nowrap; }

/* ── 타임라인 입력 ── */
#json-area {
  width:100%; flex:1; min-height:160px;
  background:#080814; border:1px solid #222240;
  color:#8af; font-family:monospace; font-size:11px;
  padding:10px; resize:none; outline:none; border-radius:4px;
  line-height:1.5;
}
#json-area:focus { border-color:#4a90e2; }
.apply-btn {
  width:100%; padding:9px; margin-top:8px;
  background:var(--c-primary); border:1px solid var(--c-primary-h);
  border-radius:var(--btn-radius); color:#fff;
  font-size:var(--btn-font); font-weight:var(--btn-fw);
  cursor:pointer; transition:var(--btn-transition); letter-spacing:.3px;
}
.apply-btn:hover { background:var(--c-primary-h); }
.apply-btn:disabled { opacity:.45; cursor:not-allowed; }
.err-msg { color:#f64; font-size:11px; margin-top:5px; min-height:16px; }

/* 파싱된 키프레임 목록 */
.kf-row {
  display:flex; align-items:center; gap:6px;
  padding:5px 8px; background:#111125;
  border:1px solid #1c1c35; border-radius:4px;
  margin-bottom:3px; font-size:11px;
}
.kf-row.current { border-color:#f84; background:#1a1200; }
.kf-time { color:#4af; font-family:monospace; min-width:48px; }
.kf-pid { color:#4a90e2; min-width:52px; }
.kf-tid { color:#556; font-size:10px; }
.kf-preview { margin-left:auto; padding:3px 8px;
              background:var(--c-muted); border:1px solid var(--c-border);
              border-radius:var(--btn-radius); color:var(--c-text);
              cursor:pointer; font-size:10px; font-weight:var(--btn-fw);
              transition:var(--btn-transition); }
.kf-preview:hover { background:var(--c-muted-h); color:var(--c-text-hi); }

/* 재생 요약 */
#tl-summary { font-size:11px; color:#445; padding:8px 0 4px; }
#tl-summary span { color:#4af; }

/* transition 필터 */
#tid-filter-wrap { margin-bottom:8px; }
.tid-chip {
  display:inline-block; padding:3px 10px; margin:2px;
  background:#111125; border:1px solid #2a2a4a;
  border-radius:12px; font-size:11px; color:#667; cursor:pointer;
}
.tid-chip.on { background:#1a3a7a; border-color:#4a90e2; color:#4af; }

/* 내보내기 버튼 */
.export-row { display:flex; gap:6px; margin-top:0; }
.exp-btn {
  flex:1; padding:7px 10px; border:1px solid var(--c-border);
  border-radius:var(--btn-radius); cursor:pointer;
  font-size:var(--btn-font); font-weight:var(--btn-fw);
  color:var(--c-text-hi); background:var(--c-muted);
  transition:var(--btn-transition); letter-spacing:.2px;
}
.exp-btn:hover { background:var(--c-muted-h); color:#fff; border-color:#3a4a80; }

/* ── 온보딩 가이드 ── */
#guide-overlay {
  position:fixed; inset:0; z-index:9999;
  display:none; pointer-events:all;
}
#guide-overlay.active { display:block; }
#guide-highlight {
  position:absolute; border:2px solid #4a90e2; border-radius:8px;
  box-shadow:0 0 0 9999px rgba(0,0,10,0.8);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  pointer-events:none; z-index:10000;
}
#guide-card {
  position:absolute; width:300px;
  background:#0e0e20; border:1px solid #2a3a6a;
  border-radius:14px; padding:26px 22px 18px;
  box-shadow:0 12px 40px rgba(0,0,0,.7);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  z-index:10001;
}
#guide-icon { font-size:32px; margin-bottom:12px; }
#guide-title { font-size:15px; font-weight:700; color:#cde; margin-bottom:9px; }
#guide-desc { font-size:13px; color:#889; line-height:1.75; margin-bottom:18px; white-space:pre-line; }
#guide-dots { display:flex; gap:6px; margin-bottom:16px; }
.guide-dot {
  width:7px; height:7px; border-radius:50%;
  background:#223; border:1px solid #334; transition:all .2s;
}
.guide-dot.on { background:#4a90e2; border-color:#4a90e2; width:20px; border-radius:4px; }
#guide-actions { display:flex; justify-content:space-between; align-items:center; }
#guide-skip {
  background:none; border:none; color:#556; font-size:12px;
  cursor:pointer; padding:6px 0; transition:color .15s;
}
#guide-skip:hover { color:#889; }
#guide-next {
  background:var(--c-primary); border:1px solid var(--c-primary-h);
  color:#fff; font-size:13px; font-weight:600;
  padding:9px 20px; border-radius:var(--btn-radius);
  cursor:pointer; transition:background .15s;
}
#guide-next:hover { background:var(--c-primary-h); }
@media (max-width:600px) {
  #guide-card {
    width: calc(100vw - 32px);
    left: 16px !important;
    right: 16px;
    transform: none !important;
    padding: 28px 20px 20px;
  }
  #guide-icon { font-size:36px; }
  #guide-title { font-size:16px; }
  #guide-desc  { font-size:14px; }
  #guide-next  { font-size:14px; padding:11px 24px; }
  #guide-skip  { font-size:13px; }
}

/* ── 타임라인 행 에디터 ── */
.tl-row {
  display:grid;
  grid-template-columns: 18px 1fr 64px 22px 22px 22px;
  align-items:center; gap:4px;
  padding:4px 6px; margin-bottom:3px;
  background:#111125; border:1px solid #1c1c35;
  border-radius:5px; font-size:12px;
}
.tl-row:hover { border-color:#2a2a55; }
.tl-handle { color:#334; cursor:grab; text-align:center; font-size:14px; user-select:none; }
.tl-pose-sel {
  background:#0a0a1e; color:#4a90e2; border:1px solid #222240;
  border-radius:3px; padding:3px 4px; font-size:11px; font-family:monospace;
  width:100%; outline:none; cursor:pointer;
}
.tl-pose-sel:focus { border-color:#4a90e2; }
.tl-dur-inp {
  background:#0a0a1e; color:#cde; border:1px solid #222240;
  border-radius:3px; padding:3px 4px; font-size:11px; text-align:center;
  width:100%; outline:none;
}
.tl-dur-inp:focus { border-color:#4a90e2; }
.tl-btn {
  background:var(--c-muted); border:1px solid var(--c-border);
  border-radius:var(--btn-radius); color:var(--c-text);
  cursor:pointer; font-size:11px; padding:3px 5px;
  line-height:1; font-weight:var(--btn-fw);
  transition:var(--btn-transition);
}
.tl-btn:hover { background:var(--c-muted-h); color:var(--c-text-hi); border-color:#3a4a80; }
</style>
</head>
<body>

<!-- ══ 뷰포트 ══ -->
<div id="viewport">
  <div id="hud">
    <div class="hud-chip" id="tcp-hud">
      L-TCP: <span id="tcp-l">-</span><br>
      R-TCP: <span id="tcp-r">-</span>
    </div>
    <div class="hud-chip" id="pose-hud">현재 포즈: <span id="cur-pose-id" style="color:#4af">-</span></div>
  </div>
  <div id="rec-badge">● REC</div>

  <!-- 재생바 -->
  <div id="playbar">
    <button class="pb-btn" id="btn-play"   onclick="playAnim()">▶</button>
    <button class="pb-btn" id="btn-pause"  onclick="pauseAnim()">⏸</button>
    <button class="pb-btn" id="btn-stop"   onclick="stopAnim()">⏹</button>
    <button class="pb-btn on" id="btn-loop" onclick="toggleLoop()">↺</button>
    <input  type="range" id="scrubber" min="0" max="10" step="0.05" value="0">
    <span id="time-lbl">0.0 / 0.0 s</span>
    <span id="status-lbl">로딩 중...</span>
  </div>
</div>

<!-- ══ 사이드바 ══ -->
<div id="sidebar">
  <div class="tabs">
    <div class="tab-btn active" onclick="switchTab('poses')">포즈 목록</div>
    <div class="tab-btn"       onclick="switchTab('timeline')">타임라인 입력</div>
    <div class="tab-btn"       onclick="switchTab('playlist')">재생 목록</div>
  </div>

  <!-- ── 포즈 목록 탭 ── -->
  <div id="tab-poses" class="tab-pane active">
    <div class="scroll" id="pose-list"></div>
  </div>

  <!-- ── 타임라인 입력 탭 ── -->
  <div id="tab-timeline" class="tab-pane" style="flex-direction:column;overflow:hidden;">
    <!-- AI 생성 헤더 -->
    <div style="padding:10px 12px 8px;border-bottom:1px solid #181830;flex-shrink:0;">
      <div class="sec" style="margin:0 0 8px">AI 댄스 시퀀스 생성</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <label style="font-size:12px;color:#99b;white-space:nowrap;">전체 길이(초)</label>
        <input id="gen-duration" type="number" min="5" max="300" value="30"
          style="width:70px;background:#0d1a2a;color:#cde;border:1px solid #223;border-radius:4px;padding:4px 8px;font-size:13px;text-align:center;"/>
        <button class="apply-btn" id="gen-btn" onclick="generateDance()"
          style="margin:0;flex:1;">✦ 생성하기</button>
      </div>
      <div id="gen-status" style="font-size:11px;color:#68a;min-height:14px;margin-top:5px;"></div>
    </div>
    <!-- 포즈 목록 헤더 -->
    <div style="padding:6px 12px 4px;border-bottom:1px solid #181830;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:10px;letter-spacing:2px;color:#4a90e2;text-transform:uppercase;">포즈 시퀀스</span>
      <div style="display:flex;gap:5px;">
        <button class="exp-btn" style="padding:4px 10px;font-size:11px;" onclick="addTLRow('P-001',0.5)">+ 추가</button>
        <button class="exp-btn" style="padding:4px 10px;font-size:11px;background:var(--c-danger);border-color:var(--c-danger-h);" onclick="clearTL()">초기화</button>
      </div>
    </div>
    <!-- 포즈 행 목록 (스크롤) -->
    <div id="tl-rows" class="scroll" style="flex:1;padding:8px;"></div>
    <!-- 하단 버튼 -->
    <div style="padding:8px 12px;border-top:1px solid #181830;flex-shrink:0;display:flex;flex-direction:column;gap:6px;">
      <div id="tl-total" style="font-size:11px;color:#445;text-align:right;"></div>
      <button class="apply-btn" style="margin:0;" onclick="applyTimeline()">✓ 적용 &amp; 재생</button>
      <div class="export-row">
        <button class="exp-btn" onclick="exportJSON()">JSON 내보내기</button>
      </div>
    </div>
  </div>

  <!-- ── 재생 목록 탭 ── -->
  <div id="tab-playlist" class="tab-pane">
    <div class="scroll">
      <div id="tid-filter-wrap">
        <div class="sec">시퀀스 선택</div>
        <div id="tid-chips"></div>
      </div>
      <div class="sec">키프레임 목록</div>
      <div id="tl-summary"></div>
      <div id="kf-list"></div>
    </div>
    <div style="padding:6px 16px 10px;display:flex;justify-content:flex-end;">
      <button class="exp-btn" style="padding:5px 14px;font-size:11px;flex:none;" onclick="exportYAML()">YAML 내보내기</button>
    </div>
  </div>
</div>

</script>

// ════════════════════════════════════════════════════════════
//  순방향 기구학 (FK)
// ════════════════════════════════════════════════════════════
function updateFK(angles) {
  CHAIN.forEach(lk => {
    const g = groups[lk.name];
    const [x,y,z] = lk.xyz, [r,p,yw] = lk.rpy;
    const qO = new THREE.Quaternion().setFromEuler(new THREE.Euler(r,p,yw,'XYZ'));

    if (lk.type === 'revolute' && lk.joint && angles[lk.joint] !== undefined) {
      const ax = new THREE.Vector3(...lk.axis).normalize();
      const qJ = new THREE.Quaternion().setFromAxisAngle(ax, angles[lk.joint]);
      g.quaternion.copy(qO).multiply(qJ);
      g.position.set(x,y,z);
    } else if (lk.type === 'prismatic' && lk.joint && angles[lk.joint] !== undefined) {
      const d = angles[lk.joint];
      g.position.set(x + lk.axis[0]*d, y + lk.axis[1]*d, z + lk.axis[2]*d);
      g.quaternion.copy(qO);
    } else {
      g.position.set(x,y,z); g.quaternion.copy(qO);
    }
  });
}

function poseToAngles(poseId) {
  const p = POSE_DB[poseId];
  if (!p) return null;
  return { ...p, L_grip:0, R_grip:0 };
}

// ════════════════════════════════════════════════════════════
//  인터폴레이션
// ════════════════════════════════════════════════════════════
function smoothStep(t) { return t*t*(3-2*t); }

function interpolate(t) {
  const tl = activeTimeline();
  if (!tl.length) return { ...q };
  if (tl.length === 1) return poseToAngles(tl[0].pose_id) || { ...q };

  let before = tl[0], after = tl[tl.length-1];
  for (let i=0; i<tl.length-1; i++) {
    if (tl[i].time <= t && tl[i+1].time >= t) { before=tl[i]; after=tl[i+1]; break; }
  }
  if (before.time === after.time) return poseToAngles(before.pose_id) || { ...q };

  const alpha  = (t - before.time) / (after.time - before.time);
  const s      = smoothStep(Math.max(0, Math.min(1, alpha)));
  const p1     = poseToAngles(before.pose_id) || q;
  const p2     = poseToAngles(after.pose_id)  || q;

  const out = {};
  JOINT_KEYS.forEach(k => { out[k] = (p1[k]??0) + ((p2[k]??0) - (p1[k]??0)) * s; });
  return out;
}

// 현재 시간에서 가장 가까운 pose_id 찾기
function nearestPoseId(t) {
  const tl = activeTimeline();
  if (!tl.length) return '-';
  let best = tl[0];
  for (const kf of tl) { if (kf.time <= t) best = kf; else break; }
  return best.pose_id;
}

//  애니메이션 제어
// ════════════════════════════════════════════════════════════
let isPlaying = false, isLooping = true;
let startWall = 0, pauseOffset = 0;
const scrubber = document.getElementById('scrubber');

function totalDur() {
  const tl = activeTimeline();
  return tl.length ? tl[tl.length-1].time : 0;
}

window.playAnim = function() {
  if (!activeTimeline().length) { alert('재생 목록 탭에서 타임라인을 먼저 적용하세요.'); return; }
  startWall = performance.now() - pauseOffset * 1000;
  isPlaying = true;
  document.getElementById('btn-play').classList.add('on');
  document.getElementById('btn-pause').classList.remove('on');
};
window.pauseAnim = function() {
  if (!isPlaying) return;
  pauseOffset = (performance.now() - startWall) / 1000;
  const d = totalDur();
  if (d>0) pauseOffset %= d;
  isPlaying = false;
  document.getElementById('btn-pause').classList.add('on');
  document.getElementById('btn-play').classList.remove('on');
};
window.stopAnim = function() {
  isPlaying = false; pauseOffset = 0;
  ['btn-play','btn-pause'].forEach(id => document.getElementById(id).classList.remove('on'));
  scrubber.value = 0;
  updateTimeLbl(0);
  updateFK(q);
};
window.toggleLoop = function() {
  isLooping = !isLooping;
  document.getElementById('btn-loop').classList.toggle('on', isLooping);
};

scrubber.addEventListener('input', () => {
  const t = parseFloat(scrubber.value);
  pauseOffset = t;
  const ang = interpolate(t);
  Object.assign(q, ang);
  updateFK(ang);
  updateTimeLbl(t);
  document.getElementById('cur-pose-id').textContent = nearestPoseId(t);
  highlightKFRow(t);
});

function updateTimeLbl(t) {
  const d = totalDur();
  document.getElementById('time-lbl').textContent = `${t.toFixed(2)} / ${d.toFixed(1)} s`;
}

// ════════════════════════════════════════════════════════════
let mediaRecorder = null, chunks = [];

window.startRec = function() {
  const stream = renderer.domElement.captureStream(30);
  mediaRecorder = new MediaRecorder(stream, {mimeType:'video/webm;codecs=vp9'});
  chunks = [];
  mediaRecorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
  mediaRecorder.start();
  document.getElementById('rec-badge').style.display = 'block';
  document.getElementById('btn-rec').classList.add('on');
  stopAnim(); playAnim();
  setStatus('녹화 중...');
};
window.stopRec = function() {
  if (!mediaRecorder) { alert('먼저 ● 녹화를 누르세요'); return; }
  mediaRecorder.stop();
  mediaRecorder.onstop = () => {
    const blob = new Blob(chunks, {type:'video/webm'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'openarmx_sim.webm';
    a.click();
    document.getElementById('rec-badge').style.display = 'none';
    document.getElementById('btn-rec').classList.remove('on');
    setStatus('저장 완료 ✓');
  };
};

// ── 타임라인 행 에디터 데이터 ──
let tlRows = []; // [{pose_id, duration}]

const POSE_IDS = Object.keys(POSE_DB); // P-001 ~ P-168

function renderTLRows() {
  const container = document.getElementById('tl-rows');
  container.innerHTML = '';
  tlRows.forEach((row, i) => {
    const div = document.createElement('div');
    div.className = 'tl-row';
    div.innerHTML = `
      <span class="tl-handle">≡</span>
      <select class="tl-pose-sel" onchange="tlRows[${i}].pose_id=this.value;updateTLTotal()">
        ${POSE_IDS.map(id => `<option value="${id}"${id===row.pose_id?' selected':''}>${id}</option>`).join('')}
      </select>
      <input class="tl-dur-inp" type="number" min="0.1" max="30" step="0.1" value="${row.duration}"
        onchange="tlRows[${i}].duration=+parseFloat(this.value).toFixed(1);updateTLTotal()">
      <button class="tl-btn" onclick="moveTLRow(${i},-1)" title="위로">↑</button>
      <button class="tl-btn" onclick="moveTLRow(${i},1)"  title="아래로">↓</button>
      <button class="tl-btn" style="color:#a44;" onclick="delTLRow(${i})" title="삭제">✕</button>
    `;
    container.appendChild(div);
  });
  updateTLTotal();
}

function updateTLTotal() {
  const total = tlRows.reduce((s, r) => s + r.duration, 0);
  const el = document.getElementById('tl-total');
  if (el) el.textContent = `총 ${tlRows.length}개 포즈 · ${total.toFixed(1)}초`;
}

window.addTLRow = function(poseId = 'P-001', duration = 0.5) {
  tlRows.push({ pose_id: poseId, duration });
  renderTLRows();
};

window.delTLRow = function(i) {
  tlRows.splice(i, 1);
  renderTLRows();
};

window.moveTLRow = function(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= tlRows.length) return;
  [tlRows[i], tlRows[j]] = [tlRows[j], tlRows[i]];
  renderTLRows();
};

window.clearTL = function() {
  tlRows = [];
  renderTLRows();
};

function tlRowsToKFs() {
  let t = 0;
  return tlRows.map(row => {
    const kf = { time: +t.toFixed(1), pose_id: row.pose_id, transition_id: '1' };
    t = +(t + row.duration).toFixed(1);
    return kf;
  });
}

window.applyTimeline = function() {
  if (!tlRows.length) { alert('포즈를 추가하세요.'); return; }
  const kfs = tlRowsToKFs();
  allKeyframes = kfs;
  const tids = ['1'];
  selectedTID = '1';
  renderTIDChips(tids);
  renderKFList();
  const d = totalDur();
  scrubber.max = d;
  stopAnim();
  switchTab('playlist');
  setStatus(`적용됨 — ${kfs.length}개 포즈, ${d.toFixed(1)}s`);
  if (isLooping) { isLooping = false; document.getElementById('btn-loop').classList.remove('on'); }
  playAnim();
};

// ════════════════════════════════════════════════════════════
//  규칙 기반 댄스 시퀀스 생성기
// ════════════════════════════════════════════════════════════
function buildDanceSequence(N) {
  function range(a, b) { return Array.from({length: b-a+1}, (_,i) => a+i); }
  function pid(n) { return `P-${String(n).padStart(3,'0')}`; }
  function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
  function rf(mn, mx) { return +((mn + Math.random()*(mx-mn)).toFixed(1)); }

  const G = {
    basic:   [1,2],
    kpop:    [...range(49,60),...range(79,84)],
    side:    range(61,78),
    guard:   range(85,92),
    hit:     range(93,102),
    cut:     range(103,112),
    inward:  range(113,120),
    onearm:  range(121,124),
    dynamic: range(125,136),
    close:   range(137,144),
    wide:    range(145,152),
    extreme: range(161,168),
  };
  const CAUTION = new Set([52,53,87,90,91,92,94,95,98,99,101,103,104,105,107,108,111,114,115,116,117,118,119,140,143,162,163,164,165,166,167]);
  const BUFFER  = [2,43,64,71,102,120,126,145,161,168];
  const WAVE_FWD = [161,162,163,164,165,166,167,168];
  const WAVE_BWD = [161,167,166,165,164,163,162,168];

  const kfs = [];
  let t = 0.0;

  function add(n) { kfs.push({transition_id:'1', time:+t.toFixed(1), pose_id:pid(n)}); }
  function step(n, iv) { add(n); t = +(t + iv).toFixed(1); }

  function consecCaution() {
    let c = 0;
    for (let i = kfs.length-1; i >= 0 && CAUTION.has(parseInt(kfs[i].pose_id.slice(2))); i--) c++;
    return c;
  }
  function safe(pool) {
    if (consecCaution() >= 2) {
      const s = pool.filter(p => !CAUTION.has(p));
      return s.length ? pick(s) : pick(BUFFER);
    }
    return pick(pool);
  }
  function inGroup(p, ...groups) { return groups.some(g => G[g] && G[g].includes(p)); }

  const returnTime = +(N - 0.9).toFixed(1);

  // ── 시작 ──
  step(1, rf(0.4, 0.6));

  // ── Section 1 (0~20%): 워밍업 ──
  const t1 = +(N * 0.20).toFixed(1);
  while (t < t1) {
    const p = safe([...G.kpop, ...G.side, ...G.wide]);
    const iv = rf(0.4, 0.6);
    step(p, iv);
  }

  // ── Section 2 (20~45%): 리듬 + 비대칭 ──
  const t2 = +(N * 0.45).toFixed(1);
  const pools2 = [G.kpop, G.guard, G.hit, G.onearm, G.side];
  while (t < t2) {
    const pool = pick(pools2);
    const p = safe(pool);
    step(p, rf(0.4, 0.65));
    if (inGroup(p,'guard','onearm') && t < t2 && Math.random() > 0.55) {
      step(pick(BUFFER), rf(0.4, 0.5));
    }
  }

  // ── Section 3 (45~65%): 웨이브 + 팝 + 컷 ──
  const t3 = +(N * 0.65).toFixed(1);
  const waveSeq = Math.random() > 0.5 ? WAVE_FWD : WAVE_BWD;
  for (const wp of waveSeq) {
    if (t >= t3 - 0.5 || t >= returnTime - 2.5) break;
    step(wp, rf(0.45, 0.55));
  }
  while (t < t3) {
    const pool = [...G.hit, ...G.cut, ...G.wide];
    const p = safe(pool);
    step(p, rf(0.4, 0.65));
    if (inGroup(p,'cut') && t < t3 && Math.random() > 0.5) {
      step(pick([161,168,102,120]), rf(0.4, 0.5));
    }
  }

  // ── Section 4 (65~85%): 큰 액션 ──
  const t4 = +(N * 0.85).toFixed(1);
  const pools4 = [G.dynamic, G.close, [...G.wide, 161, 168]];
  while (t < t4) {
    const pool = pick(pools4);
    const p = safe(pool);
    step(p, rf(0.55, 0.8));
    if (inGroup(p,'dynamic','close') && t < t4 && Math.random() > 0.5) {
      step(pick(BUFFER), rf(0.4, 0.5));
    }
  }

  // ── Section 5 (85~100%): 피날레 ──
  const safeFinale = [...G.kpop, ...G.wide, 161, 168].filter(p => !CAUTION.has(p));
  while (t < returnTime - 0.5) {
    step(safe(safeFinale), rf(0.4, 0.6));
  }

  // ── 복귀 ──
  t = returnTime;
  add(2);
  t = +(returnTime + 0.5).toFixed(1);
  add(1);
  t = +N.toFixed(1);
  add(1);

  return kfs;
}

window.generateDance = function() {
  const duration = parseFloat(document.getElementById('gen-duration').value);
  const statusEl = document.getElementById('gen-status');
  if (!duration || duration < 5) { statusEl.textContent = '⚠ 5초 이상의 시간을 입력하세요.'; return; }

  const timeline = buildDanceSequence(duration);
  // JSON → 행 에디터로 변환
  tlRows = [];
  for (let i = 0; i < timeline.length; i++) {
    const dur = i < timeline.length - 1
      ? +((timeline[i+1].time - timeline[i].time).toFixed(1))
      : 0.3;
    tlRows.push({ pose_id: timeline[i].pose_id, duration: Math.max(0.1, dur) });
  }
  renderTLRows();
  statusEl.textContent = `✓ ${timeline.length}개 포즈 생성 완료. 수정 후 적용하세요.`;
};

window.exportJSON = function() {
  const kfs = tlRows.length ? tlRowsToKFs() : allKeyframes;
  if (!kfs.length) { alert('시퀀스가 비어 있습니다.'); return; }
  const a = document.createElement('a');
  a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(kfs, null, 2));
  a.download = 'timeline.json';
  a.click();
};

window.exportYAML = function() {
  if (!allKeyframes.length) { alert('재생 목록이 비어 있습니다. 먼저 JSON 타임라인을 적용하세요.'); return; }

  const jointNames = [
    'openarmx_left_joint1','openarmx_left_joint2','openarmx_left_joint3','openarmx_left_joint4',
    'openarmx_left_joint5','openarmx_left_joint6','openarmx_left_joint7',
    'openarmx_right_joint1','openarmx_right_joint2','openarmx_right_joint3','openarmx_right_joint4',
    'openarmx_right_joint5','openarmx_right_joint6','openarmx_right_joint7'
  ];
  const shortKeys = ['L1','L2','L3','L4','L5','L6','L7','R1','R2','R3','R4','R5','R6','R7'];

  let yaml = 'joint_names:\n';
  jointNames.forEach(n => { yaml += `- ${n}\n`; });
  yaml += 'points:\n';

  allKeyframes.forEach(kf => {
    const angles = POSE_DB[kf.pose_id];
    if (!angles) return;
    yaml += '- positions:\n';
    shortKeys.forEach(k => {
      yaml += `  - ${angles[k] !== undefined ? angles[k] : 0}\n`;
    });
    yaml += `  time_from_start: ${kf.time}\n`;
  });

  const now = new Date();
  const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
  const a = document.createElement('a');
  a.href = 'data:text/yaml;charset=utf-8,' + encodeURIComponent(yaml);
  a.download = `timeline_${ts}.yaml`;
  a.click();
};

// 포즈 목록
function renderPoseList() {
  const area = document.getElementById('pose-list');
  area.innerHTML = '';
  const h = document.createElement('div');
  h.className = 'sec';
  h.textContent = `포즈 데이터베이스 (${Object.keys(POSE_DB).length}개)`;
  area.appendChild(h);

  Object.entries(POSE_DB).forEach(([id, angles]) => {
    const div = document.createElement('div');
    div.className = 'pose-card';
    div.id = `pc-${id}`;
    const preview = ['L1','L2','L3','L4','R1','R2','R3','R4']
      .map(k => `${k}:${angles[k] >= 0 ? '+' : ''}${angles[k].toFixed(2)}`).join('  ');
    div.innerHTML = `
      <span class="pose-id">${id}</span>
      <span class="pose-vals">${preview}</span>
    `;
    div.onclick = () => {
      document.querySelectorAll('.pose-card').forEach(c => c.classList.remove('active'));
      div.classList.add('active');
      const ang = poseToAngles(id);
      Object.assign(q, ang);
      updateFK(ang);
      document.getElementById('cur-pose-id').textContent = id;
      setStatus(`포즈 ${id} 미리보기`);
    };
    area.appendChild(div);
  });
}

// transition_id 칩
function renderTIDChips(tids) {
  const wrap = document.getElementById('tid-chips');
  wrap.innerHTML = '';
  tids.forEach(tid => {
    const chip = document.createElement('div');
    chip.className = 'tid-chip' + (tid === selectedTID ? ' on' : '');
    const cnt = allKeyframes.filter(k => k.transition_id === tid).length;
    chip.textContent = `ID: ${tid}  (${cnt}프레임)`;
    chip.onclick = () => {
      selectedTID = tid;
      wrap.querySelectorAll('.tid-chip').forEach(c => c.classList.remove('on'));
      chip.classList.add('on');
      const d = totalDur();
      scrubber.max = d;
      stopAnim();
      renderKFList();
      setStatus(`시퀀스 ${tid} 선택됨`);
    };
    wrap.appendChild(chip);
  });
}

// 키프레임 목록
function renderKFList() {
  const area = document.getElementById('kf-list');
  area.innerHTML = '';
  const tl = activeTimeline();
  const d = totalDur();

  const sumEl = document.getElementById('tl-summary');
  sumEl.innerHTML = tl.length
    ? `<span>${tl.length}</span>개 키프레임 &nbsp;|&nbsp; 총 <span>${d.toFixed(1)}</span>s`
    : '키프레임 없음';

  tl.forEach((kf, i) => {
    const row = document.createElement('div');
    row.className = 'kf-row';
    row.id = `kf-row-${i}`;
    row.innerHTML = `
      <span class="kf-tid">${kf.transition_id}</span>
      <span class="kf-time">${kf.time.toFixed(2)}s</span>
      <span class="kf-pid">${kf.pose_id}</span>
      <button class="kf-preview" onclick="previewPose('${kf.pose_id}')">미리보기</button>
    `;
    area.appendChild(row);
  });
}

function highlightKFRow(t) {
  const tl = activeTimeline();
  document.querySelectorAll('.kf-row').forEach(r => r.classList.remove('current'));
  let idx = 0;
  for (let i=0; i<tl.length; i++) { if (tl[i].time <= t) idx=i; else break; }
  const row = document.getElementById(`kf-row-${idx}`);
  if (row) { row.classList.add('current'); row.scrollIntoView({block:'nearest'}); }
}

window.previewPose = function(id) {
  const ang = poseToAngles(id);
  if (!ang) return;
  Object.assign(q, ang);
  updateFK(ang);
  document.getElementById('cur-pose-id').textContent = id;

  document.querySelectorAll('.pose-card').forEach(c => c.classList.remove('active'));
  const pc = document.getElementById(`pc-${id}`);
  if (pc) pc.classList.add('active');
  setStatus(`포즈 ${id} 미리보기`);
};

// 탭 전환
window.switchTab = function(tab) {
  const tabs = ['poses','timeline','playlist'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i]===tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id===`tab-${tab}`));
};

// 상태 텍스트
function setStatus(msg) { document.getElementById('status-lbl').textContent = msg; }

// ════════════════════════════════════════════════════════════
//  TCP 위치 표시
// ════════════════════════════════════════════════════════════
function updateTCP() {
  ['L_tcp','R_tcp'].forEach(n => {
    const wp = new THREE.Vector3();
    groups[n].getWorldPosition(wp);
    const x = wp.x.toFixed(3), y = (-wp.z).toFixed(3), z = wp.y.toFixed(3);
    document.getElementById(n==='L_tcp'?'tcp-l':'tcp-r').textContent = `(${x}, ${y}, ${z})`;
  });
}

// ════════════════════════════════════════════════════════════
//  메인 루프
// ════════════════════════════════════════════════════════════
function resizeRenderer() {
  const w = viewport.clientWidth;
  const h = viewport.clientHeight - 44;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

function animate() {
  requestAnimationFrame(animate);
  orbit.update();

  if (isPlaying) {
    let t = (performance.now() - startWall) / 1000;
    const d = totalDur();
    if (d > 0) {
      if (isLooping) { t = t % d; }
      else if (t >= d) { t = d; isPlaying = false; document.getElementById('btn-play').classList.remove('on'); }
      pauseOffset = t;
      const ang = interpolate(t);
      Object.assign(q, ang);
      updateFK(ang);
      scrubber.value = t;
      updateTimeLbl(t);
      document.getElementById('cur-pose-id').textContent = nearestPoseId(t);
      highlightKFRow(t);
    }
  }

  updateTCP();
  renderer.render(scene, camera);
}

window.addEventListener('resize', resizeRenderer);

// 초기화
renderPoseList();
tlRows = [{ pose_id: 'P-001', duration: 0.5 }, { pose_id: 'P-002', duration: 0.5 }];
renderTLRows();

animate();

  {
    target: null,
    icon: '🤖',

  },
];

let guideStep = 0;

function _guidePos(el, card) {
  if (!el) {
    card.style.top = '50%';
    card.style.left = '50%';
    card.style.transform = 'translate(-50%,-50%)';
    return;
  }
  card.style.transform = '';
  const r = el.getBoundingClientRect();
  const cw = 270, ch = card.offsetHeight || 180, pad = 12;
  let top = r.bottom + pad;
  let left = r.left;
  if (top + ch > window.innerHeight - pad) top = r.top - ch - pad;
  if (left + cw > window.innerWidth - pad) left = window.innerWidth - cw - pad;
  if (left < pad) left = pad;
  card.style.top  = top  + 'px';
  card.style.left = left + 'px';
}

function _guideHighlight(el, hl) {
  if (!el) { hl.style.display = 'none'; return; }
  hl.style.display = 'block';
  const r = el.getBoundingClientRect();
  const pad = 6;
  hl.style.top    = (r.top  - pad) + 'px';
  hl.style.left   = (r.left - pad) + 'px';
  hl.style.width  = (r.width  + pad * 2) + 'px';
  hl.style.height = (r.height + pad * 2) + 'px';
}

function _renderGuideStep(step) {
  const s = GUIDE_STEPS[step];
  const el = s.target ? s.target() : null;
  const overlay = document.getElementById('guide-overlay');
  const hl   = document.getElementById('guide-highlight');
  const card = document.getElementById('guide-card');

  document.getElementById('guide-icon').textContent  = s.icon;
  document.getElementById('guide-title').textContent = s.title;
  document.getElementById('guide-desc').textContent  = s.desc;

  const dots = document.getElementById('guide-dots');
  dots.innerHTML = '';
  GUIDE_STEPS.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'guide-dot' + (i === step ? ' on' : '');
    dots.appendChild(d);
  });

  const isLast = step === GUIDE_STEPS.length - 1;
  document.getElementById('guide-next').textContent = isLast ? '완료 ✓' : '다음 →';

  requestAnimationFrame(() => {
    _guideHighlight(el, hl);
    _guidePos(el, card);
  });

  if (step === 1) switchTab('timeline');
  if (step === 4) switchTab('playlist');
}

function showGuide() {
  guideStep = 0;
  document.getElementById('guide-overlay').classList.add('active');
  _renderGuideStep(0);
}

window.nextGuideStep = function() {
  guideStep++;
  if (guideStep >= GUIDE_STEPS.length) { closeGuide(); return; }
  _renderGuideStep(guideStep);
};

window.closeGuide = function() {
  document.getElementById('guide-overlay').classList.remove('active');
  localStorage.setItem('oax_guide_shown', '1');
  switchTab('timeline');
};

// 첫 방문 시 자동 실행
if (!localStorage.getItem('oax_guide_shown')) {
  setTimeout(showGuide, 800);
}
